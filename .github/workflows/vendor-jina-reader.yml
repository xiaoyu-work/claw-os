name: Vendor Jina Reader

on:
  workflow_dispatch:

jobs:
  build-and-vendor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Clone Jina Reader
        run: git clone --depth 1 https://github.com/jina-ai/reader.git /tmp/jina-reader

      - name: Install system dependencies for native modules
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev build-essential

      - name: Install dependencies
        run: cd /tmp/jina-reader && npm install

      - name: Build TypeScript
        run: cd /tmp/jina-reader && npx tsc -p . --skipLibCheck

      - name: Prepare vendor directory
        run: |
          mkdir -p rootfs/vendor/jina-reader

          # Compiled JS output
          cp -r /tmp/jina-reader/build rootfs/vendor/jina-reader/

          # Production dependencies only (re-install without dev)
          cd /tmp/jina-reader && rm -rf node_modules && npm install --production
          cp -r /tmp/jina-reader/node_modules rootfs/vendor/jina-reader/

          # Package metadata
          cp /tmp/jina-reader/package.json rootfs/vendor/jina-reader/

          # Create the licensed directory with placeholder (integrity check)
          mkdir -p rootfs/vendor/jina-reader/licensed
          touch rootfs/vendor/jina-reader/licensed/.gitkeep

      - name: Show vendor size
        run: du -sh rootfs/vendor/jina-reader/

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: vendor Jina Reader pre-built artifacts"
          title: "Vendor Jina Reader"
          body: |
            Auto-generated by vendor-jina-reader workflow.

            - Cloned jina-ai/reader at latest main
            - Compiled TypeScript to JavaScript
            - Included production node_modules only
            - Ready to be copied into rootfs by build.sh
          branch: vendor/jina-reader
          delete-branch: true
